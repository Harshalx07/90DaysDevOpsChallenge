services:

  app:
    build: .
    container_name: notes-app

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - app-network

  mongo:
    image: mongo:8

    container_name: mongodb

    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
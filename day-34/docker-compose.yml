services:

  web:
    build: ./app

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - devops-network

    labels:
      project: "90-days-devops"
      day: "34"

  db:
    image: postgres:16

    container_name: postgres-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: devopsdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - devops-network

    labels:
      project: "90-days-devops"

  redis:
    image: redis:7

    container_name: redis-cache

    networks:
      - devops-network

    labels:
      project: "90-days-devops"

networks:
  devops-network:

volumes:
  postgres_data: